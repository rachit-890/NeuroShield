version: '3.8'

services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: secure_api_db
    environment:
      POSTGRES_DB: secure_api
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: secure_api_cache
    ports:
      - "6379:6379"

  # --- AI Microservice ---
  ai-service:
    build: ./ai-service
    container_name: secure_api_ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Backend ---
  backend:
    build: ./backend
    container_name: secure_api_backend
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      ai-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/secure_api
      DB_USER: admin
      DB_PASS: password123
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: averylongsecretkeyforjwtsignatureusinghs256algorithmthatisatleast256bitslong
      APP_ENCRYPTION_KEY: averylongsecretkeyforaesencryption

  # --- Frontend ---
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: secure_api_frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
